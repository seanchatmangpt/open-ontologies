# ggen-revops.toml — RevOps manufacturing stage code generation manifest
#
# R10-1: CodeManufactory RevOps test case — proves ggen can generate from a
# second ontology (not just the CLI surface ontology).
#
# The product is CodeManufactory; RevOps is merely proof that CodeManufactory works.

[project]
name = "open-ontologies-revops"
version = "0.1.11"
description = "CodeManufactory RevOps test case — generated stage constants"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"

[ontology]
source = "ontology/revops-manufacturing.ttl"
base_uri = "https://ggen.io/onto/cli/revops/"
format = "turtle"

[rdf]
base_uri = "https://ggen.io/onto/cli/revops/"
default_format = "turtle"
cache_queries = true
store_path = ".ggen/rdf-store-revops"

[rdf.prefixes]
revops = "https://ggen.io/onto/cli/revops/"
rdf    = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs   = "http://www.w3.org/2000/01/rdf-schema#"
owl    = "http://www.w3.org/2002/07/owl#"
xsd    = "http://www.w3.org/2001/XMLSchema#"

[sparql]
timeout = 60
max_results = 1000
cache_enabled = true
cache_ttl = 3600

# Inference rules (μ₁ CONSTRUCT) — normalize RevOps stage triples before SELECT.
# Required by ggen DMAIC Phase 2 "Measure" gate.
[[inference.rules]]
name = "normalize-revops-stages"
description = "Materialize canonical revops:stageName, revops:stageOrder, rdfs:label triples for every ManufacturingStage linked to the RevOpsManufacturingProfile."
construct = """
PREFIX revops: <https://ggen.io/onto/cli/revops/>
PREFIX rdfs:   <http://www.w3.org/2000/01/rdf-schema#>
PREFIX xsd:    <http://www.w3.org/2001/XMLSchema#>

CONSTRUCT {
  ?stage revops:canonicalName  ?stageName ;
         revops:canonicalOrder ?stageOrder ;
         revops:canonicalLabel ?label .
}
WHERE {
  revops:RevOpsManufacturingProfile revops:hasStage ?stage .
  ?stage revops:stageName  ?stageName ;
         revops:stageOrder ?stageOrder ;
         rdfs:label        ?label .
}
ORDER BY ?stageOrder
"""

[generation]
enabled = true

rules = [
    { name = "revops-stages", query = { file = ".specify/queries/revops/stages_aggregated.rq" }, template = { file = ".specify/templates/revops/cmds.rs.tera" }, output_file = "src/cmds/generated_revops.rs", mode = "Overwrite" },
]

protected_paths = []

regenerate_paths = [
    "src/cmds/generated_revops.rs",
]

generated_header = """
// ============================================================
// DO NOT EDIT THIS FILE
//
// This file is auto-generated by ggen from:
//   ontology/revops-manufacturing.ttl
//
// Regenerate with: ggen sync --manifest ggen-revops.toml
// ============================================================
"""

require_confirmation = false
backup_before_write = true

[generation.poka_yoke]
warning_headers = true
gitignore_generated = false
gitattributes_generated = false
validate_imports = false

[logging]
level = "info"
format = "pretty"
output = "stderr"

[vocabulary]
allowed_namespaces = [
    "https://ggen.io/onto/cli/revops/",
    "http://purl.org/dc/terms/",
]

[security]
allowed_domains = [
    "w3.org",
    "ggen.dev",
    "ggen.io",
    "chatmangpt.com",
    "purl.org",
]
max_file_size = 104857600
validate_ssl = true
