[ontology]
source = "../../ontology/cell8-profile.ttl"
format = "turtle"

[generation]
output_dir = "../../src/cell8/generated/"

[[generation.rules]]
name = "stations"
query    = { file = "queries/manufacturing_gates.rq" }
template = { file = "templates/stations.rs.tera" }
output_file = "stations.rs"
mode = "Overwrite"

[[generation.rules]]
name = "byte_law"
query    = { file = "queries/byte_law_types.rq" }
template = { file = "templates/byte_law.rs.tera" }
output_file = "byte_law.rs"
mode = "Overwrite"
