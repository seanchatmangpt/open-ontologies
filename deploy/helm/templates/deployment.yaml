apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ontostar.fullname" . }}
  labels:
    {{- include "ontostar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ontostar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ontostar.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: ontostar
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "server"
            - "serve_http"
            - "--config"
            - "/config/config.toml"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "3050"
          ports:
            - name: mcp-http
              containerPort: 3050
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.logLevel | quote }}
            - name: OPEN_ONTOLOGIES_TENANT_ID
              value: {{ .Values.tenant.id | quote }}
          envFrom:
            - secretRef:
                name: {{ include "ontostar.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 3050
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3050
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ontostar.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          configMap:
            name: {{ include "ontostar.fullname" . }}-config
            items:
              - key: config.toml
                path: config.toml
