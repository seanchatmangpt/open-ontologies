# EXAMPLE — do NOT commit a real key. Copy this file to secret.yaml,
# fill in stringData, and apply with `kubectl apply -f secret.yaml`.
# The real secret.yaml is gitignored under deploy/k8s/secret.yaml.
#
# In production, prefer:
#   - External Secrets Operator backed by AWS/GCP Secret Manager / Vault
#   - sealed-secrets (bitnami) for GitOps
#   - SOPS-encrypted manifests for Flux
apiVersion: v1
kind: Secret
metadata:
  name: ontostar-secrets
  namespace: ontostar
  labels:
    app.kubernetes.io/name: ontostar
type: Opaque
stringData:
  # Required: Groq API key for the LLM-backed enrichment / alignment tools.
  GROQ_API_KEY: "REPLACE_ME_WITH_REAL_KEY"
  # Optional — only set if you use one of these providers:
  # OPENAI_API_KEY: ""
  # ANTHROPIC_API_KEY: ""
  # OPEN_ONTOLOGIES_EMBEDDINGS_API_KEY: ""
  # OPEN_ONTOLOGIES_EMBEDDINGS_BASE_URL: ""
