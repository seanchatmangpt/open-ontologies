apiVersion: apps/v1
kind: Deployment
metadata:
  name: ontostar
  namespace: ontostar
  labels:
    app.kubernetes.io/name: ontostar
    app.kubernetes.io/component: mcp-server
spec:
  # Single replica is the safe default — Oxigraph is an embedded store
  # backed by an RWO PersistentVolume. Scaling beyond 1 requires a shared
  # backend or per-tenant StatefulSet (see deploy/README.md).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ontostar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ontostar
        app.kubernetes.io/component: mcp-server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: ontostar
          image: ghcr.io/fabio-rovai/ontostar:latest
          imagePullPolicy: IfNotPresent
          args:
            - "server"
            - "serve_http"
            - "--config"
            - "/config/config.toml"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "3050"
          ports:
            - name: mcp-http
              containerPort: 3050
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
            - name: OPEN_ONTOLOGIES_TENANT_ID
              value: "default"
          envFrom:
            - secretRef:
                name: ontostar-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            tcpSocket:
              port: 3050
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3050
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ontostar-data
        - name: config
          configMap:
            name: ontostar-config
            items:
              - key: config.toml
                path: config.toml
