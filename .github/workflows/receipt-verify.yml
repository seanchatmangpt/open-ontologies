name: Receipt Verification (open-ontologies)

on:
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Cryptographic Receipt
        run: |
          echo "Verifying receipt for open-ontologies..."
          # R ⊢ A = μ(O*)
          # Ensure ggen is available or use the project CLI
          if [ -f "Cargo.toml" ]; then
            cargo run -- audit verify --pr-mode
          else
            echo "No audit tool found, skipping physical verification."
            exit 1
          fi
