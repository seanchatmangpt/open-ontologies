name: regression-gates

on:
  push:
    branches: [main, ontostar-integration]
  pull_request:
    branches: [main, ontostar-integration]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  verification-matrix:
    name: verification matrix (single source of truth)
    runs-on: ubuntu-latest
    env:
      GITHUB_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: regression-gates
      - name: chmod scripts
        run: chmod +x .github/scripts/*.sh tools/dead-param-gate.sh
      - name: run verification matrix
        run: bash .github/scripts/run-verification-matrix.sh
