name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: open-ontologies-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/open-ontologies

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Rename binaries
        run: |
          for dir in open-ontologies-*/; do
            target="${dir%/}"
            target="${target#open-ontologies-}"
            mv "${dir}open-ontologies" "${dir}open-ontologies-${target}"
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: open-ontologies-*/open-ontologies-*
