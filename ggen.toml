# ggen.toml — open-ontologies CLI generation manifest
#
# Three-tier architecture:
#   Tier 1 — ontology/cli-open-ontologies.ttl  (source of truth)
#   Tier 2 — ggen sync                         (manufacturing step)
#   Tier 3 — src/cmds/generated.rs             (generated CLI stubs)
#
# Pipeline flow:
#   cli-open-ontologies.ttl → CONSTRUCT normalize → SELECT aggregate
#   → Tera render → src/cmds/generated.rs
#
# Note: ggen v5 binary requires vocabulary namespaces to be in its internal allowlist.
# The cli: and onto: namespaces use https://ggen.io/onto/cli/ base URIs (allowed domain).

[project]
name = "open-ontologies"
version = "0.1.11"
description = "AI-native ontology engine CLI — generated from ontology"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"

[ontology]
source = "ontology/cli-open-ontologies.ttl"
base_uri = "https://ggen.io/onto/cli/open-ontologies/"
format = "turtle"
imports = [
    # ZOE LA Mobile domain modules — loaded so zoela/* SPARQL queries have data
    "ontology/zoela/categories.ttl",
    "ontology/zoela/navigation.ttl",
    "ontology/zoela/notifications.ttl",
    "ontology/zoela/routes.ttl",
    "ontology/zoela/connect-groups.ttl",
    "ontology/zoela/connect-group-routes.ttl",
]

[rdf]
base_uri = "https://ggen.io/onto/cli/open-ontologies/"
default_format = "turtle"
cache_queries = true
store_path = ".ggen/rdf-store"

[rdf.prefixes]
cli  = "https://ggen.io/onto/cli/spec/"
onto = "https://ggen.io/onto/cli/open-ontologies/"
rdf  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
owl  = "http://www.w3.org/2002/07/owl#"
xsd  = "http://www.w3.org/2001/XMLSchema#"

[sparql]
timeout = 60
max_results = 5000
cache_enabled = true
cache_ttl = 3600

# Inference rules (μ₁ CONSTRUCT) — normalise CLI ontology triples before SELECT queries run.
# Required by ggen DMAIC Phase 2 "Measure" gate: at least one CONSTRUCT inference rule must
# be present before the measurement system is considered capable.
[[inference.rules]]
name = "normalize-cli-commands"
description = "Materialize canonical cli:name, cli:summary, cli:description triples for every Command and SpecialCommand, and cli:verb / cli:noun triples for every Subcommand."
construct = """
PREFIX cli:  <https://ggen.io/onto/cli/spec/>
PREFIX onto: <https://ggen.io/onto/cli/open-ontologies/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

CONSTRUCT {
  ?cmd  cli:commandType  ?cmdType ;
        cli:name         ?name ;
        cli:summary      ?summary ;
        cli:description  ?desc .
  ?sub  cli:subcommandOf ?cmd ;
        cli:verb         ?verb ;
        cli:noun         ?noun .
}
WHERE {
  onto:OntoInterface cli:hasCommand ?cmd .
  { ?cmd a cli:Command .        BIND("Command"        AS ?cmdType) }
  UNION
  { ?cmd a cli:SpecialCommand . BIND("SpecialCommand"  AS ?cmdType) }

  ?cmd cli:name        ?name ;
       cli:summary     ?summary ;
       cli:description ?desc .

  OPTIONAL {
    ?cmd cli:hasSubcommand ?sub .
    ?sub cli:verb ?verb ;
         cli:noun ?noun .
  }
}
"""

[generation]
enabled = true

# Generation rules — each rule = SPARQL query + Tera template → output file
rules = [
    # Stage 1: Extract all top-level nouns in ONE aggregated row, render CLI module.
    # commands_aggregated.rq uses GROUP_CONCAT so the template renders exactly once
    # (ggen v5 renders per-row; one row = one file, no partial overwrites).
    { name = "cli-cmds", query = { file = ".specify/queries/cli/commands_aggregated.rq" }, template = { file = ".specify/templates/cli/cmds.rs.tera" }, output_file = "src/cmds/generated.rs", mode = "Overwrite" },
    # R10-1: RevOps test case — CodeManufactory manufacturing stage constants.
    # stages_aggregated.rq aggregates revops:ManufacturingStage individuals into
    # ONE row; template renders REVOPS_STAGES constant in one pass.
    { name = "revops-stages", query = { file = ".specify/queries/revops/stages_aggregated.rq" }, template = { file = ".specify/templates/revops/cmds.rs.tera" }, output_file = "src/cmds/generated_revops.rs", mode = "Overwrite" },
    # ZOE LA Mobile pipeline — canonical runtime paths (never generated/)
    { name = "zoela-mobile-types",     query = { file = ".specify/queries/zoela/extract-types.rq" },       template = { file = ".specify/templates/zoela/typescript-types.tera" }, output_file = "packages/types/zoela.ts",                                   mode = "Overwrite" },
    # zoela-mobile-migration intentionally removed: extract-tables.rq produces no rows due to
    # namespace mismatch (query targets <urn:zoela:> but TTL uses <https://zoela.org/onto/>).
    # DDL is hand-authored in supabase/migrations/20260518000001_zoela_tables.sql (protected_path).
    { name = "zoela-mobile-zod",       query = { file = ".specify/queries/zoela/extract-skos-enums.rq" },  template = { file = ".specify/templates/zoela/zod-schema.tera" },          output_file = "packages/schemas/zoela.ts",                                 mode = "Overwrite" },
    # ZOE LA Mobile pipeline — data + policy rules
    # zoela-bridge-tables intentionally removed: extract-bridge-tables.rq produces no rows.
    # DDL is hand-authored in supabase/migrations/20260518000002_zoela_bridge_tables.sql (protected_path).
    # zoela-rls intentionally removed: extract-rls-policies.rq produces no rows.
    # DDL is hand-authored in supabase/migrations/20260518000003_zoela_rls.sql (protected_path).
    { name = "zoela-forms",         query = { file = ".specify/queries/zoela/extract-form-fields.rq" },   template = { file = ".specify/templates/zoela/react-hook-form.tera" },         output_file = "packages/forms/zoela.tsx",                                    mode = "Overwrite" },
    { name = "zoela-ocel",          query = { file = ".specify/queries/zoela/extract-ocel-events.rq" },   template = { file = ".specify/templates/zoela/ocel-event.tera" },              output_file = "packages/evidence/OcelEvents.ts",                            mode = "Overwrite" },
    { name = "zoela-service-routes", query = { file = ".specify/queries/zoela/extract-service-routes.rq" }, template = { file = ".specify/templates/zoela/route-stage-gate.tera" }, output_file = "packages/routes/routeGates.ts",                               mode = "Overwrite" },
    { name = "zoela-receipts",       query = { file = ".specify/queries/zoela/extract-receipt-models.rq" }, template = { file = ".specify/templates/zoela/prov-receipt.tera" },     output_file = "packages/evidence/receipts.ts",                               mode = "Overwrite" },
    # ZOE LA Mobile pipeline — screen + navigation generation rules
    { name = "zoela-screens",       query = { file = ".specify/queries/zoela/extract-screens.rq" },        template = { file = ".specify/templates/zoela/expo-screen.tera" },            output_file = "packages/screens/zoela.tsx",                                  mode = "Overwrite" },
    { name = "zoela-admin-screens", query = { file = ".specify/queries/zoela/extract-admin-screens.rq" },  template = { file = ".specify/templates/zoela/admin-list-screen.tera" },      output_file = "packages/screens/adminScreens.tsx",                           mode = "Overwrite" },
    { name = "zoela-navigation",    query = { file = ".specify/queries/zoela/extract-navigation.rq" },     template = { file = ".specify/templates/zoela/expo-navigation-stack.tera" }, output_file = "packages/navigation/zoela.tsx",                               mode = "Overwrite" },
    # ZOE LA Mobile pipeline — role + consent access control
    { name = "zoela-roles", query = { file = ".specify/queries/zoela/extract-role-requirements.rq" }, template = { file = ".specify/templates/zoela/role-access.tera" }, output_file = "packages/types/roles.ts",                                      mode = "Overwrite" },
    { name = "zoela-assignment-eligibility", query = { file = ".specify/queries/zoela/extract-assignment-eligibility.rq" }, template = { file = ".specify/templates/zoela/assignment-eligibility.tera" }, output_file = "packages/routes/assignmentEligibility.ts", mode = "Overwrite" },
    # ZOE LA Mobile pipeline — extended rules (push cards, resource matching, follow-up, OCEL schema)
    { name = "zoela-push-cards",        query = { file = ".specify/queries/zoela/extract-push-card-fields.rq" },      template = { file = ".specify/templates/zoela/push-card.tera" },                    output_file = "packages/types/pushCards.ts",                 mode = "Overwrite" },
    { name = "zoela-resource-match",    query = { file = ".specify/queries/zoela/extract-resource-matching-rules.rq" }, template = { file = ".specify/templates/zoela/resource-match.tera" },             output_file = "packages/routes/resourceMatch.ts",            mode = "Overwrite" },
    { name = "zoela-followup-rules",    query = { file = ".specify/queries/zoela/extract-followup-rules.rq" },        template = { file = ".specify/templates/zoela/followup-rule.tera" },                output_file = "packages/routes/followupRules.ts",            mode = "Overwrite" },
    { name = "zoela-ocel-schema",       query = { file = ".specify/queries/zoela/extract-ocel-schema.rq" },           template = { file = ".specify/templates/zoela/ocel-schema.tera" },                  output_file = "packages/evidence/ocelSchema.ts",             mode = "Overwrite" },
    # ZOE LA Mobile pipeline — admin detail + expo navigation stack
    { name = "zoela-admin-detail",      query = { file = ".specify/queries/zoela/extract-admin-screens.rq" },            template = { file = ".specify/templates/zoela/admin-detail-screen.tera" },          output_file = "packages/screens/adminDetailScreen.tsx",      mode = "Overwrite" },
    { name = "zoela-nav-stack",         query = { file = ".specify/queries/zoela/extract-navigation.rq" },            template = { file = ".specify/templates/zoela/expo-navigation-stack.tera" },         output_file = "packages/navigation/navigationStack.tsx",     mode = "Overwrite" },
    # ZOE LA Mobile pipeline — connect group rules (cg-stages, cg-work-orders, cg-admin)
    { name = "zoela-cg-stages",         query = { file = ".specify/queries/zoela/extract-connect-group-stages.rq" },  template = { file = ".specify/templates/zoela/connect-group-route-stages.tera" },   output_file = "packages/routes/connectGroupStages.ts",       mode = "Overwrite" },
    { name = "zoela-cg-work-orders",    query = { file = ".specify/queries/zoela/extract-connect-group-work-orders.rq" }, template = { file = ".specify/templates/zoela/connect-group-work-orders.tera" }, output_file = "packages/routes/connectGroupWorkOrders.ts",  mode = "Overwrite" },
    { name = "zoela-cg-admin",          query = { file = ".specify/queries/zoela/extract-connect-group-admin.rq" },   template = { file = ".specify/templates/zoela/connect-group-admin-surface.tera" },  output_file = "packages/routes/connectGroupAdmin.ts",        mode = "Overwrite" },
    { name = "zoela-cg-interest-form",  query = { file = ".specify/queries/zoela/extract-connect-group-stages.rq" },  template = { file = ".specify/templates/zoela/connect-group-interest-form.tera" },   output_file = "packages/forms/connectGroupInterestForm.tsx", mode = "Overwrite" },
    # ZOE LA Mobile pipeline — Supabase Edge Functions
    { name = "zoela-edge-fn",           query = { file = ".specify/queries/zoela/extract-service-routes.rq" },        template = { file = ".specify/templates/zoela/supabase-edge-fn.tera" },             output_file = "supabase/functions/route-gate/index.ts",      mode = "Overwrite" },
]

# Protected paths — the hand-written implementations; never overwrite
protected_paths = [
    "src/cmds/alignment.rs",
    "src/cmds/clinical.rs",
    "src/cmds/data.rs",
    "src/cmds/doctor.rs",
    "src/cmds/governance.rs",
    "src/cmds/helpers.rs",
    "src/cmds/marketplace.rs",
    "src/cmds/mod.rs",
    "src/cmds/ontology.rs",
    "src/cmds/server.rs",
    "src/main.rs",
    "src/lib.rs",
    "src/domain/**",
    # Supabase migrations: hand-authored DDL until SPARQL namespace inconsistency
    # in ontology/zoela/*.ttl is resolved (extract-tables.rq targets <urn:zoela:>
    # but campus.ttl / connect-groups.ttl use <https://zoela.org/onto/>).
    "supabase/migrations/20260518000001_zoela_tables.sql",
    "supabase/migrations/20260518000002_zoela_bridge_tables.sql",
    "supabase/migrations/20260518000003_zoela_rls.sql",
]

# Regeneratable — tier-3 artifacts managed by ggen
# All ZOE LA Mobile artifacts emit to canonical runtime paths; never to generated/
regenerate_paths = [
    "src/cmds/generated.rs",
    "src/cmds/generated_revops.rs",
    # packages/types
    "packages/types/zoela.ts",
    "packages/types/roles.ts",
    "packages/types/pushCards.ts",
    # packages/schemas
    "packages/schemas/zoela.ts",
    # packages/forms
    "packages/forms/zoela.tsx",
    # packages/screens
    "packages/screens/zoela.tsx",
    "packages/screens/adminScreens.tsx",
    "packages/screens/adminDetailScreen.tsx",
    # packages/navigation
    "packages/navigation/zoela.tsx",
    "packages/navigation/navigationStack.tsx",
    # packages/routes
    "packages/routes/routeGates.ts",
    "packages/routes/assignmentEligibility.ts",
    "packages/routes/resourceMatch.ts",
    "packages/routes/followupRules.ts",
    "packages/routes/connectGroupStages.ts",
    "packages/routes/connectGroupWorkOrders.ts",
    "packages/routes/connectGroupAdmin.ts",
    # packages/evidence
    "packages/evidence/OcelEvents.ts",
    "packages/evidence/receipts.ts",
    "packages/evidence/ocelSchema.ts",
    # supabase/functions
    "supabase/functions/route-gate/index.ts",
]

generated_header = """
// ============================================================
// DO NOT EDIT THIS FILE
//
// This file is auto-generated by ggen from:
//   ontology/cli-open-ontologies.ttl
//
// Regenerate with: ggen sync
// ============================================================
"""

require_confirmation = false
backup_before_write = true

[generation.poka_yoke]
warning_headers = true
gitignore_generated = false
gitattributes_generated = true
validate_imports = false

[logging]
level = "info"
format = "pretty"
output = "stderr"

[vocabulary]
allowed_namespaces = [
    "https://ggen.io/onto/cli/spec/",
    "https://ggen.io/onto/cli/open-ontologies/",
    "https://ggen.io/onto/cli/revops/",
    "http://purl.org/dc/terms/",
]

[security]
allowed_domains = [
    "w3.org",
    "ggen.dev",
    "ggen.io",
    "chatmangpt.com",
    "purl.org",
]
max_file_size = 104857600
validate_ssl = true
