# ggen.toml — open-ontologies CLI generation manifest
#
# Three-tier architecture:
#   Tier 1 — ontology/cli-open-ontologies.ttl  (source of truth)
#   Tier 2 — ggen sync                         (manufacturing step)
#   Tier 3 — src/cmds/generated.rs             (generated CLI stubs)
#
# Pipeline flow:
#   cli-open-ontologies.ttl → CONSTRUCT normalize → SELECT aggregate
#   → Tera render → src/cmds/generated.rs
#
# Note: ggen v5 binary requires vocabulary namespaces to be in its internal allowlist.
# The cli: and onto: namespaces use https://ggen.io/onto/cli/ base URIs (allowed domain).

[project]
name = "open-ontologies"
version = "0.1.11"
description = "AI-native ontology engine CLI — generated from ontology"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"

[ontology]
source = "ontology/cli-open-ontologies.ttl"
base_uri = "https://ggen.io/onto/cli/open-ontologies/"
format = "turtle"

[rdf]
base_uri = "https://ggen.io/onto/cli/open-ontologies/"
default_format = "turtle"
cache_queries = true
store_path = ".ggen/rdf-store"

[rdf.prefixes]
cli  = "https://ggen.io/onto/cli/spec/"
onto = "https://ggen.io/onto/cli/open-ontologies/"
rdf  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs = "http://www.w3.org/2000/01/rdf-schema#"
owl  = "http://www.w3.org/2002/07/owl#"
xsd  = "http://www.w3.org/2001/XMLSchema#"

[sparql]
timeout = 60
max_results = 5000
cache_enabled = true
cache_ttl = 3600

# Inference rules (μ₁ CONSTRUCT) — normalise CLI ontology triples before SELECT queries run.
# Required by ggen DMAIC Phase 2 "Measure" gate: at least one CONSTRUCT inference rule must
# be present before the measurement system is considered capable.
[[inference.rules]]
name = "normalize-cli-commands"
description = "Materialize canonical cli:name, cli:summary, cli:description triples for every Command and SpecialCommand, and cli:verb / cli:noun triples for every Subcommand."
construct = """
PREFIX cli:  <https://ggen.io/onto/cli/spec/>
PREFIX onto: <https://ggen.io/onto/cli/open-ontologies/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

CONSTRUCT {
  ?cmd  cli:commandType  ?cmdType ;
        cli:name         ?name ;
        cli:summary      ?summary ;
        cli:description  ?desc .
  ?sub  cli:subcommandOf ?cmd ;
        cli:verb         ?verb ;
        cli:noun         ?noun .
}
WHERE {
  onto:OntoInterface cli:hasCommand ?cmd .
  { ?cmd a cli:Command .        BIND("Command"        AS ?cmdType) }
  UNION
  { ?cmd a cli:SpecialCommand . BIND("SpecialCommand"  AS ?cmdType) }

  ?cmd cli:name        ?name ;
       cli:summary     ?summary ;
       cli:description ?desc .

  OPTIONAL {
    ?cmd cli:hasSubcommand ?sub .
    ?sub cli:verb ?verb ;
         cli:noun ?noun .
  }
}
"""

[generation]
enabled = true

# Generation rules — each rule = SPARQL query + Tera template → output file
rules = [
    # Stage 1: Extract all top-level nouns in ONE aggregated row, render CLI module.
    # commands_aggregated.rq uses GROUP_CONCAT so the template renders exactly once
    # (ggen v5 renders per-row; one row = one file, no partial overwrites).
    { name = "cli-cmds", query = { file = ".specify/queries/cli/commands_aggregated.rq" }, template = { file = ".specify/templates/cli/cmds.rs.tera" }, output_file = "src/cmds/generated.rs", mode = "Overwrite" },
]

# Protected paths — the hand-written implementations; never overwrite
protected_paths = [
    "src/cmds/alignment.rs",
    "src/cmds/clinical.rs",
    "src/cmds/data.rs",
    "src/cmds/doctor.rs",
    "src/cmds/governance.rs",
    "src/cmds/helpers.rs",
    "src/cmds/marketplace.rs",
    "src/cmds/mod.rs",
    "src/cmds/ontology.rs",
    "src/cmds/server.rs",
    "src/main.rs",
    "src/lib.rs",
    "src/domain/**",
]

# Regeneratable — generated.rs is the only tier-3 artifact managed by ggen
regenerate_paths = [
    "src/cmds/generated.rs",
]

generated_header = """
// ============================================================
// DO NOT EDIT THIS FILE
//
// This file is auto-generated by ggen from:
//   ontology/cli-open-ontologies.ttl
//
// Regenerate with: ggen sync
// ============================================================
"""

require_confirmation = false
backup_before_write = true

[generation.poka_yoke]
warning_headers = true
gitignore_generated = false
gitattributes_generated = true
validate_imports = false

[logging]
level = "info"
format = "pretty"
output = "stderr"

[vocabulary]
allowed_namespaces = [
    "https://ggen.io/onto/cli/spec/",
    "https://ggen.io/onto/cli/open-ontologies/",
    "http://purl.org/dc/terms/",
]

[security]
allowed_domains = [
    "w3.org",
    "ggen.dev",
    "ggen.io",
    "chatmangpt.com",
    "purl.org",
]
max_file_size = 104857600
validate_ssl = true
