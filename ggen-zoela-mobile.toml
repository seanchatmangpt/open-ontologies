# ggen-zoela-mobile.toml — ZOE LA Mobile manufacturing manifest
#
# ZOE LA Mobile app manufacturing from public ontology declarations.
# Generates TypeScript types, Supabase migrations, and Zod schemas from
# the ZOE LA domain ontologies (person, event, need, receipt, policy).
#
# The product is CodeManufactory; RevOps is merely proof that CodeManufactory works.

[project]
name = "zoela-mobile"
version = "0.1.0"
description = "ZOE LA Mobile app manufacturing from public ontology declarations"
authors = ["Sean Chatman <sean@chatmangpt.com>"]
license = "MIT"

[ontology]
source = "ontology/zoela/navigation-bundle.ttl"
base_uri = "https://zoela.org/ontology/"
format = "turtle"

[rdf]
base_uri = "https://zoela.org/ontology/"
default_format = "turtle"
cache_queries = true
store_path = ".ggen/rdf-store-zoela-mobile"

[rdf.prefixes]
zoe   = "https://zoela.org/ontology/"
rdf   = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
rdfs  = "http://www.w3.org/2000/01/rdf-schema#"
owl   = "http://www.w3.org/2002/07/owl#"
xsd   = "http://www.w3.org/2001/XMLSchema#"
skos  = "http://www.w3.org/2004/02/skos/core#"
sh    = "http://www.w3.org/ns/shacl#"
schema = "https://schema.org/"

[sparql]
timeout = 60
max_results = 5000
cache_enabled = true
cache_ttl = 3600

# Inference rules (μ₁ CONSTRUCT) — normalise ZOE LA ontology triples.
# Required by ggen DMAIC Phase 2 "Measure" gate.
[[inference.rules]]
name = "normalize-zoela-classes"
description = "Materialize canonical zoe:tableName and zoe:columnName triples for every OWL class and datatype property declared across the ZOE LA domain ontologies."
construct = """
PREFIX zoe:  <https://zoela.org/ontology/>
PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
PREFIX owl:  <http://www.w3.org/2002/07/owl#>

CONSTRUCT {
  ?class zoe:canonicalLabel    ?className ;
         zoe:canonicalTable    ?tableName .
  ?prop  zoe:canonicalColLabel ?colLabel ;
         zoe:canonicalColName  ?colName ;
         zoe:canonicalDomain   ?class .
}
WHERE {
  ?class a owl:Class ;
         rdfs:label    ?classLabel ;
         skos:notation ?tableName .
  BIND(STR(?classLabel) AS ?className)
  OPTIONAL {
    ?prop rdfs:domain   ?class ;
          rdfs:label    ?colLabel ;
          skos:notation ?colName .
  }
}
ORDER BY ?className
"""

[generation]
enabled = true

rules = [
    # ZOE LA Mobile — screen + navigation generation rules
    { name = "zoela-screens",       query = { file = ".specify/queries/zoela/extract-screens.rq" },     template = { file = ".specify/templates/zoela/expo-screen.tera" },           output_file = "generated/zoela/screens.tsx",       mode = "Overwrite" },
    { name = "zoela-admin-screens", query = { file = ".specify/queries/zoela/extract-screens.rq" },     template = { file = ".specify/templates/zoela/admin-list-screen.tera" },     output_file = "generated/zoela/admin_screens.tsx", mode = "Overwrite" },
    { name = "zoela-navigation",    query = { file = ".specify/queries/zoela/extract-navigation.rq" },  template = { file = ".specify/templates/zoela/expo-navigation-stack.tera" }, output_file = "generated/zoela/navigation.ts",     mode = "Overwrite" },
]

# Protected paths — hand-written implementations; never overwrite
protected_paths = []

# Regeneratable — tier-3 artifacts managed by ggen
regenerate_paths = [
    "generated/zoela/screens.tsx",
    "generated/zoela/admin_screens.tsx",
    "generated/zoela/navigation.ts",
]

generated_header = """
// ============================================================
// DO NOT EDIT THIS FILE
//
// This file is auto-generated by ggen from:
//   ontology/zoela/
//
// Regenerate with: ggen sync --manifest ggen-zoela-mobile.toml
// ============================================================
"""

require_confirmation = false
backup_before_write = true

[generation.poka_yoke]
warning_headers = true
gitignore_generated = false
gitattributes_generated = false
validate_imports = false

[logging]
level = "info"
format = "pretty"
output = "stderr"

[vocabulary]
allowed_namespaces = [
    "urn:zoela:",
    "https://zoela.org/ontology/",
    "https://zoela.org/onto/",
    "http://purl.org/dc/terms/",
    "https://schema.org/",
    "http://xmlns.com/foaf/0.1/",
    "http://www.w3.org/2004/02/skos/core#",
    "http://www.w3.org/ns/shacl#",
    "http://www.w3.org/ns/org#",
    "http://www.w3.org/2006/time#",
    "http://www.w3.org/ns/prov#",
]

[security]
allowed_domains = [
    "w3.org",
    "zoela.org",
    "schema.org",
    "xmlns.com",
    "purl.org",
    "ggen.dev",
    "ggen.io",
    "chatmangpt.com",
]
max_file_size = 104857600
validate_ssl = true
